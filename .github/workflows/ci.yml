name: CI
on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check
      - run: pnpm run lint
      - run: pnpm run typecheck
      # Use the coverage variant so vitest's configured `thresholds.lines`
      # (see vitest.config.ts) actually gates CI. Plain `pnpm test` runs
      # the same suite but never enforces the threshold — the existing
      # 90% target was aspirational, not load-bearing.
      - run: pnpm run test:coverage
      - run: pnpm run build
      # Fail on high+ severity advisories. Dependabot picks up the
      # corresponding fixes and auto-merges devDep patch/minor.
      - run: pnpm audit --audit-level high

  nix:
    # Builds the flake on every PR + push to master. Catches pnpmDeps.hash
    # drift when pnpm-lock.yaml changes — nix prints the expected hash on
    # mismatch; paste it into flake.nix and push.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: nix flake check
        run: nix flake check --no-build
      - name: nix build
        run: nix build .#default

  release:
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # for npm publish --provenance
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # needed for bundle.js to read git tags
      - uses: jdx/mise-action@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Generate CycloneDX SBOM
        # cyclonedx-npm uses `npm ls` under the hood, which reports spurious
        # missing-devDep errors against a pnpm-managed tree. --ignore-npm-errors
        # is the documented workaround. --omit dev keeps the SBOM focused on
        # runtime deps.
        run: |
          pnpm dlx @cyclonedx/cyclonedx-npm \
            --ignore-npm-errors \
            --omit dev \
            --output-format JSON \
            --output-file cli-bridge-sbom.cdx.json
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: cli-bridge-sbom.cdx.json
